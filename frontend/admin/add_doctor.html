<!DOCTYPE html>
<html>

<head>

<title>Add Doctor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand">Hospital Management System</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="admin.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="#">Add Doctor</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" @click="logout">Logout</a>
</li>

</ul>

</div>
</nav>


<div class="container mt-5">

<h2 class="mb-4">Add New Doctor</h2>

<div class="card p-4 shadow">

<div class="mb-3">
<label>Full Name</label>
<input type="text" class="form-control" v-model="doctor.username" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" v-model="doctor.email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" v-model="doctor.password" required>
</div>

<div class="mb-3">

<label>Department</label>

<select class="form-control" v-model="doctor.department_id">

<option value="1">Cardiology</option>
<option value="2">Oncology</option>
<option value="3">General</option>

</select>

</div>

<div class="mb-3">
<label>Specialization</label>
<input type="text" class="form-control" v-model="doctor.specialization" required>
</div>

<button class="btn btn-success" @click="addDoctor">
Create Doctor
</button>

<div v-if="message" class="alert alert-success mt-3">
{{message}}
</div>

</div>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{

role: localStorage.getItem("role"),

doctor:{
username:"",
email:"",
password:"",
department_id:"",
specialization:""
},

message:""

},

methods:{

addDoctor(){

axios.post("http://127.0.0.1:5000/admin/add_doctor", this.doctor)

.then(res=>{

this.message = "Doctor added successfully"

this.doctor = {
username:"",
email:"",
password:"",
department_id:"",
specialization:""
}

})

.catch(err=>{
alert("Error adding doctor")
})

},

logout(){

localStorage.clear()
window.location="../index.html"

}

},

mounted(){

if(this.role!="admin"){
window.location="../index.html"
}

}



})

</script>

</body>

</html>
