<!DOCTYPE html>
<html>

<head>

<title>Patient History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand">Hospital Management System</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="admin.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="add_doctor.html">Add Doctor</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" @click="logout">Logout</a>
</li>

</ul>

</div>
</nav>


<div class="container mt-4">

<h2>Patient Treatment History</h2>

<div class="card p-3">

<table class="table table-bordered">

<thead>

<tr>
<th>Appointment ID</th>
<th>Doctor ID</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Diagnosis</th>
<th>Prescription</th>
<th>Notes</th>
</tr>

</thead>

<tbody>

<tr v-for="h in history">

<td>{{h.appointment_id}}</td>
<td>{{h.doctor_id}}</td>
<td>{{h.date}}</td>
<td>{{h.time}}</td>
<td>{{h.status}}</td>
<td>{{h.diagnosis}}</td>
<td>{{h.prescription}}</td>
<td>{{h.notes}}</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{

role: localStorage.getItem("role"),

patient_id:null,

history:[]

},

methods:{


loadHistory(){

axios.get(
"http://127.0.0.1:5000/admin/patient_history/"+this.patient_id
)

.then(res=>{
this.history = res.data
})

},


logout(){

localStorage.clear()
window.location="../index.html"

}

},

mounted(){

if(this.role!="admin"){
window.location="../index.html"
}

let params = new URLSearchParams(window.location.search)

this.patient_id = params.get("patient_id")

this.loadHistory()

}

})

</script>

</body>

</html>
