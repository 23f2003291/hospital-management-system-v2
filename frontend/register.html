<!DOCTYPE html>
<html>

<head>

<title>Patient Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="navbar"></div>

<div id="app" class="container mt-5">

<h2 class="text-center mb-4">Patient Registration</h2>

<!-- Success Message -->
<div v-if="success" class="alert alert-success text-center">
Registration successful! Redirecting to login...
</div>

<!-- Error Message -->
<div v-if="error" class="alert alert-danger text-center">
{{error_message}}
</div>

<div class="card p-4 shadow">

<div class="mb-3">
<label>Username</label>
<input type="text" class="form-control" v-model="username" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" v-model="email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" v-model="password" minlength="6" required>
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" class="form-control" v-model="age" min="1" max="120" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" class="form-control" v-model="phone" pattern="[0-9]{10}" maxlength="10" required>
</div>

<button class="btn btn-primary" @click="register">
Register
</button>

<p class="mt-3">
Already have an account?
<a href="index.html">Login</a>
</p>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{
username:"",
email:"",
password:"",
age:"",
phone:"",
success:false,
error:false,
error_message:""
},

methods:{

register(){

axios.post("http://127.0.0.1:5000/register",{

username:this.username,
email:this.email,
password:this.password,
age:this.age,
phone:this.phone

})

.then(response=>{

this.success=true
this.error=false

/* redirect to login */

setTimeout(()=>{
window.location="index.html"
},1500)

})

.catch(error=>{

this.error=true

if(error.response){
this.error_message = error.response.data.message
}else{
this.error_message = "Registration failed"
}

})

}

}

})

</script>

</body>
</html>
