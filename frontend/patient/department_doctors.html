<!DOCTYPE html>
<html>

<head>

<title>Doctors</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand">Hospital Management System</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="patient.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="patient_history.html">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="edit_profile.html">Edit Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" @click="logout">Logout</a>
</li>

</ul>

</div>
</nav>


<div class="container mt-4">

<h2>Doctors</h2>

<div class="card p-3">

<table class="table table-bordered">

<thead>

<tr>
<th>Name</th>
<th>Specialization</th>
<th>Availability</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

<tr v-for="d in doctors">

<td>{{d.name}}</td>
<td>{{d.specialization}}</td>
<td>{{d.availability}}</td>

<td>

<button
class="btn btn-success btn-sm"
@click="book(d.doctor_id)">

Book Appointment

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{

department_id:null,
doctors:[]

},

methods:{


loadDoctors(){

axios.get(
"http://127.0.0.1:5000/patient/doctors/"+this.department_id
)

.then(res=>{
this.doctors = res.data
})

},


book(id){

window.location="book_appointment.html?doctor_id="+id

},


logout(){

localStorage.clear()
window.location="../index.html"

}

},


mounted(){

let params = new URLSearchParams(window.location.search)

this.department_id = params.get("department_id")

this.loadDoctors()

}

})

</script>

</body>
</html>
