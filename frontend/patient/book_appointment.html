<!DOCTYPE html>
<html>

<head>

<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand">Hospital Management System</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="patient.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="patient_history.html">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="edit_profile.html">Edit Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" @click="logout">Logout</a>
</li>

</ul>

</div>
</nav>


<div class="container mt-5">

<h2>Book Appointment</h2>

<div class="card p-4 shadow">

<div class="mb-3">
<label>Date</label>
<input type="date" class="form-control" v-model="date">
</div>

<div class="mb-3">
<label>Time</label>
<input type="time" class="form-control" v-model="time">
</div>

<button class="btn btn-success" @click="book">
Confirm Appointment
</button>

<div v-if="message" class="alert alert-success mt-3">
{{message}}
</div>

</div>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{

doctor_id:null,

patient_id: localStorage.getItem("patient_id"),

date:"",
time:"",

message:""

},

methods:{


book(){

axios.post(
"http://127.0.0.1:5000/patient/book_appointment",
{
doctor_id:this.doctor_id,
patient_id:this.patient_id,
date:this.date,
time:this.time
}
)

.then(res=>{

this.message="Appointment booked successfully"

setTimeout(()=>{

window.location="patient.html"

},1000)

})

.catch(err=>{

alert("Doctor already booked at this time")

})

},


logout(){

localStorage.clear()
window.location="../index.html"

}

},


mounted(){

let params = new URLSearchParams(window.location.search)

this.doctor_id = params.get("doctor_id")

}

})

</script>

</body>
</html>
