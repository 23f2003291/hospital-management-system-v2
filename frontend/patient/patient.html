<!DOCTYPE html>
<html>

<head>

<title>Patient Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand">Hospital Management System</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="#">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="patient_history.html">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="edit_profile.html">Edit Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" @click="logout">Logout</a>
</li>

</ul>

</div>
</nav>


<div class="container mt-4">

<h2>Patient Dashboard</h2>


<!-- Departments -->
<div class="card p-3 mb-4">

<h4>Departments</h4>

<table class="table table-bordered">

<tr v-for="d in departments">

<td>{{d.name}}</td>

<td>
<button class="btn btn-primary btn-sm"
@click="viewDoctors(d.id)">
View Doctors
</button>
</td>

</tr>

</table>

</div>


<!-- Upcoming Appointments -->
<div class="card p-3">

<h4>Completed and Upcoming Appointments</h4>

<table class="table table-bordered">

<thead>

<tr>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr v-for="a in appointments">

<td>{{a.doctor}}</td>
<td>{{a.date}}</td>
<td>{{a.time}}</td>
<td>{{a.status}}</td>

<td>

<button
class="btn btn-danger btn-sm"
@click="cancel(a.appointment_id)"
v-if="a.status=='booked'">

Cancel

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{

role: localStorage.getItem("role"),

patient_id: localStorage.getItem("patient_id"),

departments:[],
appointments:[]

},

methods:{


loadDepartments(){

axios.get("http://127.0.0.1:5000/patient/departments")

.then(res=>{
this.departments = res.data
})

},


loadAppointments(){

axios.get("http://127.0.0.1:5000/patient/upcoming/"+this.patient_id)

.then(res=>{
this.appointments = res.data
})

},


viewDoctors(dept_id){

window.location="department_doctors.html?department_id="+dept_id

},


cancel(id){

if(confirm("Are you sure you want to cancel the appointment?")){

axios.post("http://127.0.0.1:5000/patient/cancel_appointment",{
appointment_id:id
})

.then(()=>{
this.loadAppointments()
})
}
},


logout(){

localStorage.clear()
window.location="../index.html"

}

},


mounted(){

if(this.role!="patient"){
window.location="../index.html"
}

this.loadDepartments()
this.loadAppointments()

}

})

</script>

</body>
</html>
