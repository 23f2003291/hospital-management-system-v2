<!DOCTYPE html>
<html>

<head>

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div id="app">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand">Hospital Management System</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="patient.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="patient_history.html">History</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="#">Edit Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" @click="logout">Logout</a>
</li>

</ul>

</div>
</nav>


<div class="container mt-5">

<h2>Edit Profile</h2>

<div class="card p-4 shadow">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" v-model="name" disabled>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" v-model="email" disabled>
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" class="form-control" v-model="age">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" class="form-control" v-model="phone" pattern="[0-9]{10}">
</div>

<button class="btn btn-success" @click="updateProfile">
Update Profile
</button>

<div v-if="message" class="alert alert-success mt-3">
{{message}}
</div>

</div>

</div>

</div>


<script>

new Vue({

el:"#app",

data:{

patient_id: localStorage.getItem("patient_id"),

name:"",
email:"",
age:"",
phone:"",

message:""

},

methods:{

loadProfile(){

axios.get(
"http://127.0.0.1:5000/patient/profile/"+this.patient_id
)

.then(res=>{

this.name = res.data.name
this.email = res.data.email
this.age = res.data.age
this.phone = res.data.phone

})

},

updateProfile(){

axios.put(

"http://127.0.0.1:5000/patient/update_profile/"+this.patient_id,

{
age:this.age,
phone:this.phone
}

)

.then(res=>{

this.message="Profile updated successfully"

})

},

logout(){

localStorage.clear()

window.location="../index.html"

}

},

mounted(){

this.loadProfile()

}

})

</script>

</body>
</html>
